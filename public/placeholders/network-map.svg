  <rect x='90' y='90' width='1420' height='720' rx='28' fill='url(#panel)' stroke='#ffffff' stroke-opacity='0.24'/>
  <g fill='none' stroke='#ffffff' stroke-opacity='0.42' stroke-width='2'>
    <path d='M170 620C420 510 530 580 720 470C930 350 1080 390 1370 250'/>
